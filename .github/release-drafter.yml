name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER)"
change-title-escapes: '\<*_&'
exclude-labels:
  - "release"
  - "wip"

categories:
  - title: "💥 Breaking Changes"
    labels:
      - "breaking"
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
  - title: "📚 Documentation"
    labels:
      - "documentation"
  - title: "🔧 Maintenance"
    labels:
      - "chore"
  - title: "⚙️ GitHub Actions"
    labels:
      - "github-actions"
  - title: "⬆️ Dependencies"
    labels:
      - "dependencies"
  - title: "🔒 Security"
    labels:
      - "security"
  - title: "⚠️ Deprecations"
    labels:
      - "deprecated"

version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "fix"
      - "documentation"
      - "chore"
      - "github-actions"
      - "dependencies"
      - "security"
      - "deprecated"
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
