name: CI & Release

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "assets/**"
      - ".github/release-drafter.yml"
      - ".github/CODEOWNERS"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/conventional-commit-types.json"
      - ".github/dependabot.yml"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "assets/**"
      - ".github/release-drafter.yml"
      - ".github/CODEOWNERS"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/conventional-commit-types.json"
      - ".github/dependabot.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-devcontainer:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Build devcontainer image
        run: docker build -f .devcontainer/Dockerfile.dev -t prs-devcontainer .

      - name: Export image
        run: docker save prs-devcontainer | gzip > prs-devcontainer.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v6
        with:
          name: prs-devcontainer
          path: prs-devcontainer.tar.gz
          retention-days: 1

  quality:
    needs: build-devcontainer
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: prs-devcontainer

      - name: Load image
        run: docker load < prs-devcontainer.tar.gz

      - name: Run formatting checks (Black)
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "${{ github.workspace }}:/app" -w /app prs-devcontainer black --check src tests

      - name: Run linting checks (Ruff)
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "${{ github.workspace }}:/app" -w /app prs-devcontainer ruff check src tests

      - name: Run type checks (mypy)
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "${{ github.workspace }}:/app" -w /app -e PYTHONPATH=src prs-devcontainer mypy src

      - name: Check lockfiles are up to date
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "${{ github.workspace }}:/app" -w /app prs-devcontainer sh -c "
            pip-compile requirements.txt --output-file requirements.lock --annotate --quiet --strip-extras --cache-dir /tmp/.cache &&
            pip-compile requirements-dev.txt --output-file requirements-dev.lock --annotate --quiet --strip-extras --cache-dir /tmp/.cache
          "
          if ! git diff --exit-code requirements.lock requirements-dev.lock; then
            echo ""
            echo "::error::Lockfiles are out of sync with requirements files."
            echo "::error::Run './scripts/compile-deps.sh' locally and commit the updated lockfiles."
            exit 1
          fi

  tests:
    needs: build-devcontainer
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: prs-devcontainer

      - name: Load image
        run: docker load < prs-devcontainer.tar.gz

      - name: Run tests (pytest)
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "${{ github.workspace }}:/app" -w /app -e PYTHONPATH=src prs-devcontainer pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  build-and-push:
    needs: [quality, tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag as 'latest' for pushes to main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag as 'develop' for pushes to develop
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            # Tag as version for tags like v1.0.0
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Tag as sha-<commit> for traceability on main
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
